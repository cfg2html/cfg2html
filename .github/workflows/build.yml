# .github/workflows/build.yml
# -------------------------------------------------------------------------------------------------
# 2026-04-11 - initial version by Ralph Roth
# GitHub Action to automate RPM/DEB/Tarball builds and releases for cfg2html
# -------------------------------------------------------------------------------------------------

name: Build and Release Packages

on:
  push:
    branches:
      - feature/release-automation  # Current test branch
    tags:
      - '[0-9]+.[0-9]+.[0-9]+*'     # Standard versioning tags

env:
  # Opt into Node.js 24 to stay ahead of the June 2026 deprecation deadline
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          fetch-depth: 0 # Required for git-describe to see history/tags

      - name: Install Build Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y debhelper devscripts rpm build-essential

      - name: Build Debian Package
        run: make deb

      - name: Build RPM Package
        run: make rpm

      - name: Create Source Tarball
        run: |
          VERSION=$(grep '^VERSION=' cfg2html | cut -d'"' -f2)
          ## tar -czvf cfg2html-${VERSION}.tar.gz . --exclude=.git
          git archive --format=tar.gz --prefix=cfg2html-${VERSION}/ -o cfg2html-${VERSION}.tar.gz HEAD

      - name: Upload Artifacts
        uses: actions/upload-artifact@v5
        with:
          name: build-packages
          path: |
            linux/*.deb
            linux/*.rpm
            *.tar.gz

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            linux/*.deb
            linux/*.rpm
            *.tar.gz
          body_path: CHANGELOG.md
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
